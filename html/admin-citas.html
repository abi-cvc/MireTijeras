<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Citas | MireTijeras</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/admin-citas.css">
</head>
<body>
    <header class="admin-header"></header>
    <div class="admin-title-bar">
        <button id="back-dashboard" class="back-rect-arrow" title="Volver al panel" aria-label="Volver al panel">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M15 19l-7-7 7-7" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </button>
        <h1 class="admin-title">Gestión de Citas</h1>
    </div>
    <main class="citas-admin-main">
        <section class="citas-calendar-section">
            <h2>Calendario de Citas</h2>
            <div id="calendar-admin"></div>
        </section>
        <section class="citas-franjas-section">
            <div class="franjas-header">
                <h2>Franjas Horarias</h2>
                <button id="add-franja-btn">+ Nueva franja</button>
            </div>
            <div id="franjas-list"></div>
        </section>
    </main>

    <!-- Modal agregar / editar franja -->
    <div id="franja-modal" class="franja-horaria">
        <div class="franja-modal-content">
            <h3 id="franja-modal-title">Nueva Franja Horaria</h3>
            <input type="hidden" id="franja-edit-id">
            <label>Día
                <input type="date" id="franja-dia">
            </label>
            <label>Hora inicio
                <input type="time" id="franja-inicio">
            </label>
            <label>Hora fin
                <input type="time" id="franja-fin">
            </label>
            <div id="franja-error" class="franja-error"></div>
            <div class="franja-btns">
                <button id="franja-save-btn">Guardar</button>
                <button id="franja-cancel-btn" class="btn-secondary">Cancelar</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.20/index.global.min.js"></script>
    <script src="../js/admin-common.js"></script>
    <script src="../js/admin-citas.js"></script>
</body>
</html>
